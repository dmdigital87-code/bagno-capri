<script type="text/babel">
const {useState,useMemo,useEffect,useRef}=React;

const T={bg:"#faf6f0",sand:"#f0e2c8",sandDark:"#d9c9a5",sea:"#0e7c8c",seaLight:"#4db8c7",accent:"#e2613b",ok:"#27ae60",okSoft:"rgba(39,174,96,.1)",warn:"#e74c3c",warnSoft:"rgba(231,76,60,.1)",gold:"#c9963a",goldSoft:"rgba(201,150,58,.12)",dark:"#1e130a",darkSoft:"#6b5040",card:"#fffdf9",white:"#fff",border:"rgba(110,80,64,.1)",overlay:"rgba(30,19,10,.82)"};

const ITEMS={umbrella:{icon:"🏖️",lbl:"Ombrellone",price:25,bookable:true},sunbed:{icon:"🛏️",lbl:"Lettino",price:10,bookable:true},cabana:{icon:"🏠",lbl:"Cabina",price:40,bookable:true},shower:{icon:"🚿",lbl:"Doccia"},bar:{icon:"🍹",lbl:"Bar"},walkway:{icon:"",lbl:"Passaggio"},empty:{icon:"",lbl:""}};
const ROLES={owner:"Proprietario",manager:"Manager",operator:"Operatore"};
const MONTHS=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const DAYS_S=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
const uid=()=>Math.random().toString(36).slice(2,10);
const fmtDate=d=>{const dt=new Date(d);return`${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;};
const today=()=>new Date().toISOString().split("T")[0];
const addDays=(d,n)=>{const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];};
const getWeekDates=date=>{const d=new Date(date);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d.setDate(diff));return Array.from({length:7},(_,i)=>addDays(mon.toISOString().split("T")[0],i));};
const font="'Outfit',sans-serif";
const fontD="'Cormorant Garamond',Georgia,serif";
const btnS=(bg,col="#fff")=>({padding:"10px 20px",borderRadius:10,border:"none",background:bg,color:col,cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:font,transition:"all .15s",display:"inline-flex",alignItems:"center",gap:6});
const cardS={background:T.card,borderRadius:16,border:`1px solid ${T.border}`,boxShadow:"0 2px 12px rgba(0,0,0,.04)",padding:20};
const inputSt={width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${T.sandDark}`,fontSize:14,fontFamily:font,background:T.white,color:T.dark,outline:"none"};
const labelSt={display:"block",fontSize:11,color:T.darkSoft,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.8,fontFamily:font};

/* ─── BUILD GRID (configurable) ─── */
const buildBeachGridCfg=(frontRows=3,frontPerSide=5,backRows=14,backPerSide=4)=>{const rows=[];
  for(let f=1;f<=frontRows;f++){const row=[];for(let c=0;c<frontPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});row.push({id:uid(),type:"walkway",num:null,bookings:[],fila:f,label:`${f}ª FILA`});for(let c=0;c<frontPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});rows.push(row);}
  for(let f=frontRows+1;f<=frontRows+backRows;f++){const row=[];for(let c=0;c<backPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});row.push({id:uid(),type:"empty",num:null,bookings:[],fila:f});row.push({id:uid(),type:"walkway",num:null,bookings:[],fila:f,label:`${f}ª FILA`});row.push({id:uid(),type:"empty",num:null,bookings:[],fila:f});for(let c=0;c<backPerSide;c++)row.push({id:uid(),type:"umbrella",num:0,bookings:[],fila:f});rows.push(row);}
  /* Numera da destra a sinistra in ogni fila: #1 = estrema destra fila 1 */
  let n=1;rows.forEach(row=>{const umbs=row.filter(c=>c.type==="umbrella");for(let i=umbs.length-1;i>=0;i--)umbs[i].num=n++;});
  return rows;};
const buildCabinRowsCfg=(cabinRows=2,cabinsPerRow=15)=>{const rows=[];let n=1;for(let r=0;r<cabinRows;r++){const row=[];for(let c=0;c<cabinsPerRow;c++)row.push({id:uid(),type:"cabana",num:n++,bookings:[]});rows.push(row);}return rows;};
const buildBeachGrid=()=>buildBeachGridCfg(3,5,14,4);
const buildCabinRows=()=>buildCabinRowsCfg(2,15);
/* Rinumera una griglia esistente da destra a sinistra per fila (preserva prenotazioni) */
const renumberGrid=(grid)=>{let n=1;grid.forEach(row=>{const umbs=row.filter(c=>c.type==="umbrella");for(let i=umbs.length-1;i>=0;i--)umbs[i].num=n++;});return grid;};

/* ─── SIMPLE SVG BAR CHART ─── */
const MiniBarChart=({data,labelKey,bars,height=180})=>{
  const maxVal=Math.max(...data.flatMap(d=>bars.map(b=>d[b.key]||0)),1);
  const bw=Math.floor(260/data.length/(bars.length+0.5));
  const gap=4;
  const totalW=data.length*(bars.length*bw+gap*2)+20;
  return(<svg viewBox={`0 0 ${Math.max(totalW,300)} ${height+30}`} style={{width:"100%",height:height+30}}>
    {data.map((d,i)=>{const x=20+i*(bars.length*bw+gap*2);return(<g key={i}>
      {bars.map((b,bi)=>{const val=d[b.key]||0;const h=Math.max((val/maxVal)*(height-20),2);return(<g key={bi}>
        <rect x={x+bi*(bw+1)} y={height-h} width={bw} height={h} rx={3} fill={b.color} opacity={0.85}/>
        {val>0&&<text x={x+bi*(bw+1)+bw/2} y={height-h-4} textAnchor="middle" fontSize="9" fill={T.darkSoft}>{val}</text>}
      </g>);})}
      <text x={x+bars.length*bw/2} y={height+14} textAnchor="middle" fontSize="10" fill={T.darkSoft} fontFamily={font}>{d[labelKey]}</text>
    </g>);})}
  </svg>);
};

/* ─── CALENDAR ─── */
const CalendarView=({grid,cabins,selectedDate,setSelectedDate})=>{
  const[viewMode,setViewMode]=useState("week");
  const weekDates=getWeekDates(selectedDate);const cur=new Date(selectedDate);
  const mDays=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const fDay=(new Date(cur.getFullYear(),cur.getMonth(),1).getDay()+6)%7;
  const cnt=date=>{let t=0,b=0;grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"){t++;if(c.bookings?.some(bk=>date>=bk.from&&date<=bk.to))b++;}}));cabins.forEach(r=>r.forEach(c=>{t++;if(c.bookings?.some(bk=>date>=bk.from&&date<=bk.to))b++;}));return{t,b,a:t-b};};
  const allBk=useMemo(()=>{const bks=[];grid.forEach((row,r)=>row.forEach((cell,c)=>cell.bookings?.forEach(b=>bks.push({...b,r,c,type:cell.type,num:cell.num}))));cabins.forEach((row,r)=>row.forEach((cell,c)=>cell.bookings?.forEach(b=>bks.push({...b,r,c,type:"cabana",num:cell.num}))));return bks.sort((a,b)=>a.from.localeCompare(b.from));},[grid,cabins]);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",gap:6}}>{["week","month"].map(m=><button key={m} onClick={()=>setViewMode(m)} style={{...btnS(viewMode===m?T.accent:"rgba(0,0,0,.04)",viewMode===m?"#fff":T.dark),padding:"8px 16px",fontSize:12}}>{m==="week"?"Settimana":"Mese"}</button>)}</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button onClick={()=>setSelectedDate(addDays(selectedDate,viewMode==="week"?-7:-30))} style={{...btnS("rgba(0,0,0,.04)",T.dark),padding:"8px 12px"}}>‹</button>
        <span style={{fontFamily:fontD,fontSize:18,color:T.dark,minWidth:160,textAlign:"center"}}>{MONTHS[cur.getMonth()]} {cur.getFullYear()}</span>
        <button onClick={()=>setSelectedDate(addDays(selectedDate,viewMode==="week"?7:30))} style={{...btnS("rgba(0,0,0,.04)",T.dark),padding:"8px 12px"}}>›</button>
      </div>
    </div>
    {viewMode==="week"?(<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
      {weekDates.map((d,i)=>{const c=cnt(d);const sel=d===selectedDate;return(<div key={d} onClick={()=>setSelectedDate(d)} style={{...cardS,cursor:"pointer",textAlign:"center",padding:"14px 8px",border:sel?`2px solid ${T.accent}`:`1px solid ${T.border}`,background:sel?"rgba(226,97,59,.04)":T.card}}>
        <div style={{fontSize:11,color:T.darkSoft,fontWeight:600}}>{DAYS_S[i]}</div><div style={{fontFamily:fontD,fontSize:22,color:T.dark,margin:"6px 0"}}>{new Date(d).getDate()}</div><div style={{fontSize:18,marginBottom:4}}>{c.a>0?"🟢":"🔴"}</div><div style={{fontSize:11,color:T.darkSoft}}>{c.b}/{c.t}</div></div>);})}</div>)
    :(<div style={cardS}><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {DAYS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:T.darkSoft,fontWeight:600,padding:6}}>{d}</div>)}
      {Array.from({length:fDay}).map((_,i)=><div key={`e${i}`}/>)}
      {Array.from({length:mDays}).map((_,i)=>{const d=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;const c=cnt(d);const pct=c.t?Math.round(c.b/c.t*100):0;const sel=d===selectedDate;
        return(<div key={d} onClick={()=>setSelectedDate(d)} style={{textAlign:"center",padding:"8px 2px",borderRadius:8,cursor:"pointer",background:sel?"rgba(226,97,59,.1)":pct>80?"rgba(231,76,60,.06)":"transparent",border:sel?`2px solid ${T.accent}`:"2px solid transparent"}}><div style={{fontSize:13,fontWeight:sel?700:400,color:T.dark}}>{i+1}</div><div style={{fontSize:10,color:pct>80?T.warn:pct>50?T.gold:T.ok}}>{pct}%</div></div>);})}</div></div>)}
    <div style={cardS}>
      <h3 style={{fontFamily:fontD,fontSize:18,color:T.dark,marginBottom:12}}>Prenotazioni del {fmtDate(selectedDate)}</h3>
      {allBk.filter(b=>selectedDate>=b.from&&selectedDate<=b.to).length===0?<p style={{color:T.darkSoft,fontSize:13}}>Nessuna prenotazione.</p>:
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{allBk.filter(b=>selectedDate>=b.from&&selectedDate<=b.to).map((b,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"rgba(0,0,0,.02)",borderRadius:10}}><div><span style={{fontWeight:600,color:T.dark,fontSize:13}}>{b.type==="cabana"?"🏠":"🏖️"} {b.clientName}</span><span style={{fontSize:12,color:T.darkSoft,marginLeft:8}}>{b.type==="cabana"?`C${b.num}`:`Omb.${b.num}`} · {fmtDate(b.from)}→{fmtDate(b.to)}</span></div><span style={{fontFamily:fontD,fontSize:16,color:T.accent}}>€{b.total}</span></div>))}</div>}
    </div>
  </div>);
};

/* ─── DASHBOARD ─── */
const DashboardView=({grid,cabins,est})=>{
  const allBk=useMemo(()=>{const b=[];grid.forEach(r=>r.forEach(c=>c.bookings?.forEach(bk=>b.push({...bk,type:c.type}))));cabins.forEach(r=>r.forEach(c=>c.bookings?.forEach(bk=>b.push({...bk,type:"cabana"}))));return b;},[grid,cabins]);
  let tU=0,bU=0,tC=0,bC=0,rev=0;
  grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"){tU++;if(c.bookings?.some(b=>today()>=b.from&&today()<=b.to))bU++;}}));
  cabins.forEach(r=>r.forEach(c=>{tC++;if(c.bookings?.some(b=>today()>=b.from&&today()<=b.to))bC++;}));
  allBk.forEach(b=>rev+=b.total);
  const weekD=useMemo(()=>getWeekDates(today()).map((d,i)=>{let o=0;grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"&&c.bookings?.some(b=>d>=b.from&&d<=b.to))o++;}));return{day:DAYS_S[i],occupati:o,liberi:tU-o};}),[grid,tU]);
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}><Stat icon="🏖️" label="Ombrelloni" value={`${bU}/${tU}`} color={T.dark}/><Stat icon="🏠" label="Cabine" value={`${bC}/${tC}`} color={T.gold}/><Stat icon="💰" label="Incasso" value={`€${rev}`} color={T.accent}/><Stat icon="📋" label="Prenotazioni" value={allBk.length} color={T.sea}/></div>
    <div style={cardS}><h4 style={{fontFamily:fontD,fontSize:16,color:T.dark,marginBottom:12}}>📊 Occupazione settimanale</h4><MiniBarChart data={weekD} labelKey="day" bars={[{key:"occupati",color:T.accent},{key:"liberi",color:T.ok}]}/></div>
  </div>);
};

const AdminPanel=({est,setEst,users,setUsers,currentUser,setEstRaw})=>{
  const[tab,setTab]=useState("pricing");const[showUF,setShowUF]=useState(false);const[uf,setUf]=useState({name:"",email:"",role:"operator",pin:""});const[editU,setEditU]=useState(null);
  /* ── Calcolatrice stagionali (moved out of IIFE to fix hooks) ── */
  const[calcDisp,setCalcDisp]=useState("0");const[calcFirst,setCalcFirst]=useState(null);const[calcOp,setCalcOp]=useState(null);const[calcNext,setCalcNext]=useState(false);
  const calcPress=(v)=>{
    if(v==="C"){setCalcDisp("0");setCalcFirst(null);setCalcOp(null);setCalcNext(false);}
    else if(v==="="){if(calcOp&&calcFirst!==null){const a=parseFloat(calcFirst),b=parseFloat(calcDisp);const r=calcOp==="+"?a+b:calcOp==="-"?a-b:calcOp==="×"?a*b:calcOp==="÷"&&b!==0?Math.round((a/b)*100)/100:0;setCalcDisp(String(r));setCalcFirst(null);setCalcOp(null);setCalcNext(true);}}
    else if(["+","-","×","÷"].includes(v)){setCalcFirst(calcDisp);setCalcOp(v);setCalcNext(true);}
    else{if(calcNext||calcDisp==="0"){setCalcDisp(v==="."?"0.":v);setCalcNext(false);}else{setCalcDisp(calcDisp.length<12?calcDisp+v:calcDisp);}}
  };
  const calcKeys=["C","÷","×","-","7","8","9","+","4","5","6","=","1","2","3","0","."];

/* ═══════ MINI CALCULATOR MODAL ═══════ */
const CalcModal=({onClose,onInsert})=>{
  const[disp,setDisp]=useState("0");
  const[first,setFirst]=useState(null);
  const[op,setOp]=useState(null);
  const[next,setNext]=useState(false);
  const press=(v)=>{
    if(v==="C"){setDisp("0");setFirst(null);setOp(null);setNext(false);}
    else if(v==="="){ if(op&&first!==null){const a=parseFloat(first),b=parseFloat(disp);let r=op==="+"?a+b:op==="-"?a-b:op==="×"?a*b:op==="÷"&&b!==0?Math.round((a/b)*100)/100:0;setDisp(String(r));setFirst(null);setOp(null);setNext(true);}}
    else if(["+","-","×","÷"].includes(v)){setFirst(disp);setOp(v);setNext(true);}
    else if(v==="→"){onInsert(parseFloat(disp)||0);onClose();}
    else if(v==="."){if(next){setDisp("0.");setNext(false);}else if(!disp.includes(".")){setDisp(disp+".");}}
    else{if(next||disp==="0"){setDisp(v);setNext(false);}else{setDisp(disp.length<10?disp+v:disp);}}
  };
  const keys=[["C","÷","×","-"],["7","8","9","+"],[" 4","5","6","="],["1","2","3","→"],["0","."]];
  const opKeys=["+","-","×","÷","=","→","C"];
  const btnColor=(v)=>v==="→"?T.gold:v==="C"?T.warn:opKeys.includes(v)?T.sea:"rgba(0,0,0,.07)";
  const btnText=(v)=>v==="→"?"→ usa":v===" 4"?"4":v;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(30,19,10,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100,animation:"fadeIn .2s"}}>

          {op&&<span style={{fontSize:12,color:T.darkSoft,marginRight:6}}>{first} {op}</span>}{disp}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {["C","÷","×","-","7","8","9","+","4","5","6","=","1","2","3","→","0","0","0","."].map((v,i)=>{
            if(i===17||i===18)return null;
            const isZero=i===16;
            return(<button key={i} onClick={()=>press(v)} style={{gridColumn:isZero?"span 2":undefined,padding:"10px 0",borderRadius:8,border:"none",background:btnColor(v),color:["+","-","×","÷","=","→","C"].includes(v)?"#fff":T.dark,cursor:"pointer",fontSize:v==="→"?11:15,fontWeight:700,fontFamily:font,transition:"opacity .1s"}}>{btnText(v)}</button>);
          })}
          <button onClick={()=>press(".")} style={{padding:"10px 0",borderRadius:8,border:"none",background:"rgba(0,0,0,.07)",color:T.dark,cursor:"pointer",fontSize:15,fontWeight:700,fontFamily:font}}>.</button>
        </div>
        <div style={{fontSize:10,color:T.darkSoft,marginTop:10,textAlign:"center"}}>Premi <strong>→ usa</strong> per inserire il risultato nel prezzo</div>
      </div>
    </div>
  );
};

/* ═══════ CLOUD SYNC + LOCAL STORAGE ═══════ */
const LS_KEY="bagnocapri_v1";
const CLOUD_KEY="bagnocapri_cloud_v1";
const loadData=()=>{try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}};
const saveData=(data)=>{try{localStorage.setItem(LS_KEY,JSON.stringify(data));return true;}catch(e){return false;}};
const loadCloudCfg=()=>{try{const r=localStorage.getItem(CLOUD_KEY);return r?JSON.parse(r):null;}catch(e){return null;}};
const saveCloudCfg=(cfg)=>{try{localStorage.setItem(CLOUD_KEY,JSON.stringify(cfg));}catch(e){}};
const clearCloudCfg=()=>{try{localStorage.removeItem(CLOUD_KEY);}catch(e){}};
/* encode/decode access code = base64(binId:apiKey) */
const encodeAccessCode=(binId,apiKey)=>btoa(`${binId}||${apiKey}`);
const decodeAccessCode=(code)=>{try{const[b,k]=atob(code).split("||");return{binId:b,apiKey:k};}catch(e){return null;}};
const hashPin=(pin)=>{let h=0;for(let i=0;i<pin.length;i++){h=((h<<5)-h)+pin.charCodeAt(i);h|=0;}return h.toString(36);};
const cloudFetch=async(binId,apiKey)=>{
  const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,{headers:{"X-Master-Key":apiKey,"X-Bin-Meta":false}});
  if(!r.ok)return null;
  const d=await r.json();return d.record||d;
};
const cloudPush=async(binId,apiKey,data)=>{
  const r=await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":apiKey},body:JSON.stringify(data)});
  return r.ok;
};
const cloudCreate=async(apiKey,data)=>{
  const r=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":apiKey,"X-Bin-Private":"true","X-Bin-Name":"BagnoCapri"},body:JSON.stringify(data)});
  if(!r.ok)return null;
  const d=await r.json();return d.metadata?.id||null;
};

      if(remote){
        if(remote.est){renumberGrid(remote.est.grid);setEstRaw(remote.est);}
        if(remote.users)setUsers(remote.users);
        if(remote.clients)setClients(remote.clients);
        if(remote.convenzionate)setConvenzionate(remote.convenzionate);
        if(remote.inventory)setInventory(remote.inventory);
        saveData(remote);
      }
      setSyncStatus("ok");setLastSync(new Date());
    }catch(e){setSyncStatus("error");}
    setAppState("app");
  };

  /* ── New setup: create cloud bin ── */
  const handleSetupNew=async()=>{
    if(!setupForm.apiKey.trim()){setSetupError("Inserisci la API Key di JSONBin.");return;}
    if(setupForm.pin.length<4){setSetupError("Il PIN deve essere di almeno 4 cifre.");return;}
    if(setupForm.pin!==setupForm.pin2){setSetupError("I PIN non coincidono.");return;}
    setSetupLoading(true);setSetupError("");
    try{
      const initData={est:defaultData(),users:defaultUsers(),clients:defaultClients(),convenzionate:[],inventory:{ombrelloni:[],lettini:[],sdraio:[],sedie_regista:[]}};
      const binId=await cloudCreate(setupForm.apiKey,initData);
      if(!binId){setSetupError("Errore creazione bin. Controlla la API Key.");setSetupLoading(false);return;}
      const cfg={binId,apiKey:setupForm.apiKey,pinHash:hashPin(setupForm.pin)};
      saveCloudCfg(cfg);saveData(initData);
      setShowAccessCode(encodeAccessCode(binId,setupForm.apiKey));
      setEstRaw(initData.est);setUsers(initData.users);setClients(initData.clients);
      setSetupStep(99);
    }catch(e){setSetupError("Errore di rete. Controlla la connessione.");}
    setSetupLoading(false);
  };

  /* ── Existing setup: connect to existing bin ── */
  const handleSetupExisting=async()=>{
    if(!setupForm.accessCode.trim()){setSetupError("Inserisci il Codice Accesso.");return;}
    if(setupForm.pin.length<4){setSetupError("Inserisci il PIN.");return;}
    setSetupLoading(true);setSetupError("");
    try{
      const decoded=decodeAccessCode(setupForm.accessCode.trim());
      if(!decoded){setSetupError("Codice Accesso non valido.");setSetupLoading(false);return;}
      const remote=await cloudFetch(decoded.binId,decoded.apiKey);
      if(!remote){setSetupError("Impossibile accedere. Verifica il Codice Accesso.");setSetupLoading(false);return;}
      // validate PIN against stored hash in cloud
      if(remote.pinHash&&hashPin(setupForm.pin)!==remote.pinHash){
        // PIN not matching
        setSetupError("PIN non corretto per questo account.");setSetupLoading(false);return;
      }
      const cfg={binId:decoded.binId,apiKey:decoded.apiKey,pinHash:remote.pinHash||hashPin(setupForm.pin)};
      saveCloudCfg(cfg);
      if(remote.est){renumberGrid(remote.est.grid);setEstRaw(remote.est);}
      if(remote.users)setUsers(remote.users);
      if(remote.clients)setClients(remote.clients);
      if(remote.convenzionate)setConvenzionate(remote.convenzionate||[]);
      if(remote.inventory)setInventory(remote.inventory||{ombrelloni:[],lettini:[],sdraio:[],sedie_regista:[]});
      saveData(remote);
      setSyncStatus("ok");setLastSync(new Date());setAppState("app");
    }catch(e){setSetupError("Errore di rete. Controlla la connessione.");}
    setSetupLoading(false);
  };

  /* ── auto-save local + cloud ── */
  const saveRef=useRef(null);
  const cloudRef=useRef(null);
  const latestDataRef=useRef(null);

  /* Salva subito al localStorage (no debounce) */
  const saveNow=()=>{
    const data={est,users,clients,convenzionate,inventory};
    saveData(data);
    setSaveStatus("saved");
  };

  /* beforeunload: salva tutto prima di chiudere/ricaricare */
  useEffect(()=>{
    const handler=()=>{
      const data={est,users,clients,convenzionate,inventory};
      try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}
    };
    window.addEventListener("beforeunload",handler);
    return()=>window.removeEventListener("beforeunload",handler);
  },[est,users,clients,convenzionate,inventory]);

  useEffect(()=>{
    if(appState!=="app")return;
    setSaveStatus("unsaved");
    /* Salvataggio locale immediato (100ms debounce minimo) */
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>{
      setSaveStatus("saving");
      const data={est,users,clients,convenzionate,inventory};
      const ok=saveData(data);
      setSaveStatus(ok?"saved":"error");
      // push to cloud with a longer debounce
      clearTimeout(cloudRef.current);
      cloudRef.current=setTimeout(async()=>{
        const cfg=loadCloudCfg();
        if(!cfg)return;
        setSyncStatus("syncing");
        const pushed=await cloudPush(cfg.binId,cfg.apiKey,{...data,pinHash:cfg.pinHash});
        setSyncStatus(pushed?"ok":"error");
        if(pushed)setLastSync(new Date());
      },3000);
    },100);
    return()=>{clearTimeout(saveRef.current);clearTimeout(cloudRef.current);};
  },[est,users,clients,convenzionate,inventory,appState]);

  const manualSave=async()=>{
    setSaveStatus("saving");setSyncStatus("syncing");
    const data={est,users,clients,convenzionate,inventory};
    saveData(data);setSaveStatus("saved");
    const cfg=loadCloudCfg();
    if(cfg){const ok=await cloudPush(cfg.binId,cfg.apiKey,{...data,pinHash:cfg.pinHash});setSyncStatus(ok?"ok":"error");if(ok){setLastSync(new Date());notify("☁️ Sincronizzato!","ok");}else notify("⚠️ Errore sincronizzazione","err");}
    else{notify("💾 Salvato localmente","ok");}
  };

  const manualPull=async()=>{
    const cfg=loadCloudCfg();if(!cfg)return;
    setSyncStatus("syncing");
    try{
      const remote=await cloudFetch(cfg.binId,cfg.apiKey);
      if(remote){
        if(remote.est){renumberGrid(remote.est.grid);setEstRaw(remote.est);}if(remote.users)setUsers(remote.users);
        if(remote.clients)setClients(remote.clients);if(remote.convenzionate)setConvenzionate(remote.convenzionate||[]);
        if(remote.inventory)setInventory(remote.inventory||{ombrelloni:[],lettini:[],sdraio:[],sedie_regista:[]});
        saveData(remote);setSyncStatus("ok");setLastSync(new Date());notify("☁️ Dati aggiornati dal cloud!","ok");
      }
    }catch(e){setSyncStatus("error");notify("⚠️ Errore sincronizzazione","err");}
  };

  const resetData=()=>{
    if(!window.confirm("Sei sicuro? Tutti i dati verranno azzerati e ripristinati ai valori di default."))return;
    try{localStorage.removeItem(LS_KEY);localStorage.removeItem(CLOUD_KEY);}catch(e){}
    window.location.reload();
  };

  const notify=(m,t="ok")=>{setNotif({m,t});setTimeout(()=>setNotif(null),3000);};
  const setEst=fn=>setEstRaw(prev=>typeof fn==="function"?fn(prev):{...prev,...fn});
  const setGrid=fn=>setEstRaw(prev=>({...prev,grid:typeof fn==="function"?fn(prev.grid):fn}));
  const setCabins=fn=>setEstRaw(prev=>({...prev,cabins:typeof fn==="function"?fn(prev.cabins):fn}));

  /* ── MODIFICATO: calcola il prezzo usando il prezzo manuale mezza giornata ── */
  const calcPrice=(type,days,from,isHalfDay=false,extras={},isConv=false,convPrice=0,to=null)=>{
    if(isConv)return Math.round(convPrice);
    const extrasPerDay=(extras.lettino||0)*(est.pricing.sunbed||10)+(extras.sdraio||0)*(est.pricing.sdraio||6)+(extras.sedia_regista||0)*(est.pricing.sedia_regista||5);
    // if to is provided, calculate day by day across seasons
    if(to&&to!==from){
      let total=0;
      const start=new Date(from);const end=new Date(to);
      for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
        const ds=d.toISOString().split("T")[0];
        const sp=est.seasonPricing?.find(s=>ds>=s.from&&ds<=s.to);
        const base=sp&&sp[type]!=null?sp[type]:(est.pricing[type]||ITEMS[type]?.price||0);
        const mainPrice=isHalfDay&&est.halfDay?.enabled?(est.halfDay[type]??Math.round(base*0.6)):base;
        total+=mainPrice+extrasPerDay;
      }
      return Math.round(total);
    }
    const sp=est.seasonPricing?.find(s=>from>=s.from&&from<=s.to);
    const base=sp&&sp[type]!=null?sp[type]:(est.pricing[type]||ITEMS[type]?.price||0);
    let mainPrice=isHalfDay&&est.halfDay?.enabled?(est.halfDay[type]??Math.round(base*0.6)):base;
    return Math.round((mainPrice+extrasPerDay)*days);
  };

      est.grid.forEach((row,r)=>row.forEach((cell,c)=>{if(cell.type==="umbrella"){const bk=cell.bookings?.find(b=>date>=b.from&&date<=b.to);if(bk)items.push({num:cell.num,fila:cell.fila,client:bk.clientName,from:bk.from,to:bk.to,total:bk.total,isHalfDay:bk.isHalfDay,isConv:bk.isConv,convName:bk.convName,extras:bk.extras});}}));
    } else {
      est.cabins.forEach((row,r)=>row.forEach((cell,c)=>{const bk=cell.bookings?.find(b=>date>=b.from&&date<=b.to);if(bk)items.push({num:cell.num,client:bk.clientName,from:bk.from,to:bk.to,total:bk.total,isConv:bk.isConv,convName:bk.convName});}));
    }
    return items.sort((a,b)=>a.num-b.num);
  };

  const onBookCabin=(r,c,cell,bk)=>{if(bk)setModal({type:"details",r,c,cell,bk,src:"cabin"});else{setBookForm({clientName:"",from:selectedDate,to:addDays(selectedDate,0),days:1,isHalfDay:false,extras:{lettino:0,sdraio:0,sedia_regista:0},isConv:false,convName:"",convPrice:0,sub:null});setModal({type:"book",r,c,cell,src:"cabin"});}};
  const confirmBooking=()=>{if(!bookForm.clientName.trim())return;const{r,c,cell,src}=modal;const toDate=bookForm.to||addDays(bookForm.from,bookForm.days-1);const extras=bookForm.extras||{};const extrasTotal=(extras.lettino||0)*(est.pricing.sunbed||10)+(extras.sdraio||0)*(est.pricing.sdraio||6)+(extras.sedia_regista||0)*(est.pricing.sedia_regista||5);const extrasTot=extrasTotal*bookForm.days;const total=bookForm.sub==="stagionale"?(bookForm.stagPrezzo||0)+extrasTot:bookForm.isConv?bookForm.convPrice:calcPrice(cell.type,bookForm.days,bookForm.from,bookForm.isHalfDay,extras,false,0,toDate);const nb={id:uid(),clientName:bookForm.clientName,from:bookForm.from,to:toDate,days:bookForm.days,isHalfDay:bookForm.isHalfDay,extras,isConv:bookForm.isConv||false,convName:bookForm.convName||"",sub:bookForm.sub||null,total};
    if(src==="grid")setGrid(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:[...cl.bookings,nb]}:cl)));
    else setCabins(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:[...cl.bookings,nb]}:cl)));
    const existingCl=clients.find(cl=>cl.name.toLowerCase()===bookForm.clientName.toLowerCase());if(!existingCl)setClients(p=>[...p,{id:uid(),name:bookForm.clientName,phone:"",email:"",notes:"",sub:bookForm.sub||null,created:today()}]);else if(bookForm.sub&&!existingCl.sub)setClients(p=>p.map(cl=>cl.name.toLowerCase()===bookForm.clientName.toLowerCase()?{...cl,sub:bookForm.sub}:cl));
    setModal(null);notify(`Prenotato per ${bookForm.clientName}!`);};
  const freeBk=()=>{const{r,c,bk,src}=modal;
    if(src==="grid")setGrid(g=>g.map((row,ri)=>row.map((cl,ci)=>ri===r&&ci===c?{...cl,bookings:cl.bookings.filter(b=>b.id!==bk.id)}:cl)));

    setModal(null);notify("Rimossa.");};

          <h2 style={{fontFamily:fontD,fontSize:24,color:T.dark,marginBottom:4}}>Bagno Capri</h2>
          <p style={{color:T.darkSoft,fontSize:13}}>Configurazione accesso cloud</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <button onClick={()=>setSetupStep(2)} style={{...btnS(T.accent),justifyContent:"center",padding:"14px",fontSize:14}}>☁️ Prima configurazione — crea il mio account</button>
          <button onClick={()=>setSetupStep(3)} style={{...btnS(T.sea),justifyContent:"center",padding:"14px",fontSize:14}}>🔑 Ho già un account — accedi</button>
        </div>
        <div style={{marginTop:16,padding:"12px 14px",background:"rgba(0,0,0,.03)",borderRadius:10}}>
          <div style={{fontSize:11,color:T.darkSoft,lineHeight:1.6}}>
            ☁️ I dati vengono sincronizzati via <strong>JSONBin.io</strong> (gratuito).<br/>
            📱 Accedi da qualsiasi dispositivo con il tuo Codice Accesso + PIN.<br/>
            🔒 I dati sono privati e protetti dalla tua API Key.
          </div>
        </div>
      </>}

      {/* Step 2: new account */}
      {setupStep===2&&<>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <button onClick={()=>setSetupStep(1)} style={{background:"none",border:"none",cursor:"pointer",color:T.darkSoft,fontSize:18}}>←</button>
          <h3 style={{fontFamily:fontD,fontSize:20,color:T.dark}}>☁️ Crea il tuo account</h3>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{padding:"10px 14px",background:T.goldSoft,borderRadius:10,fontSize:12,color:T.gold}}>
            <strong>Passo 1:</strong> Crea un account gratuito su <a href="https://jsonbin.io" target="_blank" style={{color:T.gold}}>jsonbin.io</a> →<br/>
            Dashboard → API Keys → copia la <strong>Master Key</strong>
          </div>
          <div>
            <label style={labelSt}>Master Key JSONBin</label>
            <input value={setupForm.apiKey} onChange={e=>setSetupForm(p=>({...p,apiKey:e.target.value}))} placeholder="$2a$10$..." style={{...inputSt,fontFamily:"monospace",fontSize:12}} type="password"/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}>
              <label style={labelSt}>PIN di accesso</label>
              <input value={setupForm.pin} onChange={e=>setSetupForm(p=>({...p,pin:e.target.value.replace(/\D/g,"").slice(0,8)}))} placeholder="es. 1234" style={{...inputSt,textAlign:"center",fontSize:22,letterSpacing:8}} type="password" maxLength="8"/>
            </div>
            <div style={{flex:1}}>
              <label style={labelSt}>Conferma PIN</label>
              <input value={setupForm.pin2} onChange={e=>setSetupForm(p=>({...p,pin2:e.target.value.replace(/\D/g,"").slice(0,8)}))} onKeyDown={e=>e.key==="Enter"&&handleSetupNew()} placeholder="es. 1234" style={{...inputSt,textAlign:"center",fontSize:22,letterSpacing:8}} type="password" maxLength="8"/>
            </div>
          </div>
          {setupError&&<div style={{padding:"8px 12px",background:T.warnSoft,borderRadius:8,fontSize:12,color:T.warn}}>{setupError}</div>}
          <button onClick={handleSetupNew} disabled={setupLoading} style={{...btnS(T.accent),justifyContent:"center",padding:"13px",opacity:setupLoading?.6:1}}>
            {setupLoading?"⏳ Creazione in corso...":"✅ Crea account e inizia"}
          </button>
        </div>
      </>}

      {/* Step 3: existing account login */}
      {setupStep===3&&<>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <button onClick={()=>setSetupStep(1)} style={{background:"none",border:"none",cursor:"pointer",color:T.darkSoft,fontSize:18}}>←</button>
          <h3 style={{fontFamily:fontD,fontSize:20,color:T.dark}}>🔑 Accedi all'account</h3>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label style={labelSt}>Codice Accesso</label>
            <textarea value={setupForm.accessCode} onChange={e=>setSetupForm(p=>({...p,accessCode:e.target.value.trim()}))} placeholder="Incolla qui il tuo Codice Accesso..." style={{...inputSt,height:80,resize:"none",fontFamily:"monospace",fontSize:11}}/>
            <div style={{fontSize:10,color:T.darkSoft,marginTop:2}}>Trovi il Codice Accesso nell'app del dispositivo su cui hai configurato l'account (Admin → Esporta & Dati)</div>
          </div>
          <div>
            <label style={labelSt}>PIN</label>
            <input value={setupForm.pin} onChange={e=>setSetupForm(p=>({...p,pin:e.target.value.replace(/\D/g,"").slice(0,8)}))} onKeyDown={e=>e.key==="Enter"&&handleSetupExisting()} placeholder="••••" style={{...inputSt,textAlign:"center",fontSize:28,letterSpacing:10}} type="password" maxLength="8"/>
          </div>
          {setupError&&<div style={{padding:"8px 12px",background:T.warnSoft,borderRadius:8,fontSize:12,color:T.warn}}>{setupError}</div>}
          <button onClick={handleSetupExisting} disabled={setupLoading} style={{...btnS(T.sea),justifyContent:"center",padding:"13px",opacity:setupLoading?.6:1}}>
            {setupLoading?"⏳ Connessione...":"🔑 Accedi e carica dati"}
          </button>
        </div>
      </>}

      {/* Step 99: setup complete — show access code */}
      {setupStep===99&&<>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:40,marginBottom:8}}>🎉</div>
          <h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:4}}>Account creato!</h3>
          <p style={{fontSize:13,color:T.darkSoft}}>Salva il tuo <strong>Codice Accesso</strong> per accedere da altri dispositivi.</p>
        </div>
        <div style={{background:T.goldSoft,borderRadius:12,padding:16,marginBottom:16}}>
          <label style={{...labelSt,color:T.gold}}>🔑 Il tuo Codice Accesso</label>
          <div style={{background:T.white,borderRadius:8,padding:"10px 12px",fontFamily:"monospace",fontSize:10,wordBreak:"break-all",color:T.dark,border:`1px solid ${T.border}`,lineHeight:1.5,marginBottom:8}}>{showAccessCode}</div>
          <button onClick={()=>{navigator.clipboard?.writeText(showAccessCode);notify("Codice copiato!","ok");}} style={{...btnS(T.gold),width:"100%",justifyContent:"center",padding:"9px"}}>📋 Copia codice</button>

      <div style={{display:"flex",gap:2,flex:1}}>{NAV.filter(n=>n.id!=="admin"||isAdmin).map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontFamily:font,fontWeight:500,background:page===n.id?"rgba(226,97,59,.15)":"transparent",color:page===n.id?T.accent:"rgba(255,255,255,.55)",transition:"all .15s",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:14}}>{n.icon}</span><span>{n.lbl}</span></button>)}</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {/* Sync status indicator */}
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {syncStatus==="syncing"&&<span style={{fontSize:10,color:"rgba(255,200,0,.8)",display:"flex",alignItems:"center",gap:3}}>⏳ Sync...</span>}
          {syncStatus==="ok"&&<span style={{fontSize:10,color:"rgba(100,220,100,.8)",display:"flex",alignItems:"center",gap:3}} title={lastSync?`Ultimo sync: ${lastSync.toLocaleTimeString("it-IT")}`:""}><span style={{width:6,height:6,borderRadius:"50%",background:"rgba(100,220,100,.8)",display:"inline-block"}}/>Cloud</span>}
          {syncStatus==="error"&&<span style={{fontSize:10,color:"rgba(255,100,100,.8)"}}>⚠️ Sync</span>}
          <button onClick={()=>{saveNow();manualSave();}} title="Salva tutto" style={{
            padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontFamily:font,fontWeight:700,
            background:saveStatus==="unsaved"?"rgba(226,97,59,.9)":saveStatus==="saving"?"rgba(255,200,0,.7)":"rgba(100,220,100,.2)",
            color:saveStatus==="unsaved"?"#fff":saveStatus==="saving"?"#fff":"rgba(100,220,100,.9)",
            transition:"all .2s",display:"flex",alignItems:"center",gap:5,
            boxShadow:saveStatus==="unsaved"?"0 0 8px rgba(226,97,59,.4)":"none"
          }}>💾 {saveStatus==="unsaved"?"Salva":saveStatus==="saving"?"Salvo...":"Salvato"}</button>
          <button onClick={manualPull} title="Scarica dati dal cloud" style={{...btnS("rgba(14,124,140,.2)","rgba(77,184,199,.9)"),padding:"5px 10px",fontSize:11,border:"1px solid rgba(14,124,140,.2)"}}>☁️</button>
        </div>
        {isAdmin&&<span style={{fontSize:10,color:T.gold,background:"rgba(201,150,58,.15)",padding:"3px 8px",borderRadius:5,fontWeight:600}}>🔓 {currentUser?.name}</span>}
        {isAdmin?<button onClick={()=>{setCurrentUser(null);setPage("beach");notify("Disconnesso.","info");}} style={{...btnS("rgba(255,255,255,.08)","rgba(255,255,255,.6)"),padding:"6px 12px",fontSize:11}}>Esci</button>
        :<button onClick={()=>setPage("login")} style={{...btnS("rgba(255,255,255,.08)","rgba(255,255,255,.6)"),padding:"6px 12px",fontSize:11}}>🔒 Login</button>}
      </div>
    </nav>
    <Notify n={notif}/>
    <main style={{maxWidth:1100,margin:"0 auto",padding:"16px 20px",animation:"slideUp .4s"}}>
      {page==="beach"&&<div>
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          {(()=>{let t=0,b=0,tc=0,bc=0,rev=0;est.grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella"){t++;if(c.bookings?.some(bk=>selectedDate>=bk.from&&selectedDate<=bk.to))b++;}}));est.cabins.forEach(r=>r.forEach(c=>{tc++;if(c.bookings?.some(bk=>selectedDate>=bk.from&&selectedDate<=bk.to))bc++;}));est.grid.forEach(r=>r.forEach(c=>c.bookings?.forEach(bk=>rev+=bk.total)));est.cabins.forEach(r=>r.forEach(c=>c.bookings?.forEach(bk=>rev+=bk.total)));
            return[<Stat key="u" icon="🏖️" label="Ombrelloni" value={`${b}/${t}`} color={T.dark} onClick={()=>setOccModal({type:"umbrella"})}/>,<Stat key="c" icon="🏠" label="Cabine" value={`${bc}/${tc}`} color={T.gold} onClick={()=>setOccModal({type:"cabin"})}/>,<Stat key="r" icon="💰" label="Incasso" value={`€${rev}`} color={T.accent}/>];})()}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><label style={{...labelSt,marginBottom:0}}>Data:</label><input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{...inputSt,width:170}}/><button onClick={()=>setSelectedDate(today())} style={{...btnS("rgba(0,0,0,.04)",T.dark),padding:"7px 12px",fontSize:11}}>Oggi</button></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 14px",background:"rgba(0,0,0,.02)",borderRadius:8,marginBottom:12,alignItems:"center"}}>
          {[{d:T.ok,l:"Disponibile"},{d:T.warn,l:"Prenotato"}].map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:"50%",background:l.d}}/><span style={{fontSize:11,color:T.darkSoft}}>{l.l}</span></div>)}
          <span style={{marginLeft:"auto",fontSize:10,color:"rgba(110,80,64,.3)"}}>{(()=>{let u=0,c=0;est.grid.forEach(r=>r.forEach(cl=>{if(cl.type==="umbrella")u++;}));est.cabins.forEach(r=>r.forEach(()=>c++));return`${u} ombrelloni · ${c} cabine`;})()}</span>
        </div>
        <BeachMap grid={est.grid} cabins={est.cabins} selectedDate={selectedDate} onBook={onBook} onBookCabin={onBookCabin}/>
      </div>}
      {page==="calendar"&&<CalendarView grid={est.grid} cabins={est.cabins} selectedDate={selectedDate} setSelectedDate={setSelectedDate}/>}
      {page==="clients"&&<ClientsView clients={clients} setClients={setClients} convenzionate={convenzionate} setConvenzionate={setConvenzionate} grid={est.grid} cabins={est.cabins}/>}
      {page==="inventory"&&<InventoryView inventory={inventory} setInventory={setInventory}/>}
      {page==="dashboard"&&<DashboardView grid={est.grid} cabins={est.cabins} est={est}/>}
      {page==="admin"&&isAdmin&&<AdminPanel est={est} setEst={fn=>setEstRaw(typeof fn==="function"?fn:p=>({...p,...fn}))} users={users} setUsers={setUsers} currentUser={currentUser} setEstRaw={setEstRaw}/>}
    </main>

    {modal?.type==="book"&&<Modal onClose={()=>setModal(null)} wide>
      <h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:2}}>{modal.cell.type==="cabana"?"🏠 Prenota Cabina":"🏖️ Prenota Ombrellone"}</h3>
      <p style={{color:T.darkSoft,fontSize:12,marginBottom:14}}>{modal.cell.type==="cabana"?`Cabina C${modal.cell.num}`:`Ombrellone n° ${modal.cell.num} · Fila ${modal.cell.fila}`}</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>

        {/* Cliente */}
        <div><label style={labelSt}>Cliente</label><input list="cl-list" value={bookForm.clientName} onChange={e=>setBookForm(p=>({...p,clientName:e.target.value}))} placeholder="Nome" style={inputSt}/><datalist id="cl-list">{clients.map(cl=><option key={cl.id} value={cl.name}/>)}</datalist></div>

        {/* Tipo abbonamento */}
        <div>
          <label style={labelSt}>Tipo abbonamento</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[null,"giornaliero","settimanale","mensile","stagionale"].map(s=>(
              <button key={s||"n"} onClick={()=>{
                setBookForm(p=>({...p,sub:s,isHalfDay:s==="stagionale"?false:p.isHalfDay}));
              }} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontFamily:font,cursor:"pointer",border:bookForm.sub===s?`2px solid ${s==="stagionale"?T.gold:T.accent}`:`1px solid ${T.border}`,background:bookForm.sub===s?s==="stagionale"?T.goldSoft:"rgba(226,97,59,.08)":T.white,color:T.dark,fontWeight:bookForm.sub===s?700:400}}>
                {s==="stagionale"?"⭐ Stagionale":s||"Nessuno"}
              </button>
            ))}
          </div>
        </div>

        {/* Banner stagionale — prezzo unico intero periodo */}
        {bookForm.sub==="stagionale"&&<div style={{background:T.goldSoft,borderRadius:12,border:`1.5px solid rgba(201,150,58,.35)`,padding:"14px 16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:T.gold,marginBottom:10}}>⭐ Abbonamento Stagionale — intero periodo apertura</div>
          <label style={labelSt}>💶 Prezzo stagionale accordato con il cliente</label>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:20,color:T.darkSoft,fontWeight:700}}>€</span>
            <input autoFocus type="number" min="0" step="1" value={bookForm.stagPrezzo||""} onChange={e=>setBookForm(p=>({...p,stagPrezzo:+e.target.value||0}))} placeholder="0" style={{...inputSt,fontSize:26,fontFamily:fontD,fontWeight:700,textAlign:"center",flex:1}}/>
            <button onClick={()=>setBookForm(p=>({...p,showCalc:true}))} style={{...btnS(T.gold),padding:"10px 14px",fontSize:18,flexShrink:0}} title="Calcolatrice">🧮</button>
          </div>
        </div>}

        {/* Date arrivo / partenza */}
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <label style={labelSt}>Arrivo</label>
            <input type="date" value={bookForm.from} onChange={e=>{
              const f=e.target.value;const t=(bookForm.to||f)<f?f:(bookForm.to||f);
              const d=Math.round((new Date(t)-new Date(f))/(86400000))+1;
              setBookForm(p=>({...p,from:f,to:t,days:Math.max(1,d)}));
            }} style={inputSt}/>
          </div>
          <div style={{flex:1}}>
            <label style={labelSt}>Partenza</label>
            <input type="date" value={bookForm.to||bookForm.from} min={bookForm.from} onChange={e=>{
              const t=e.target.value;const d=Math.round((new Date(t)-new Date(bookForm.from))/(86400000))+1;
              setBookForm(p=>({...p,to:t,days:Math.max(1,d)}));
            }} style={inputSt}/>
          </div>
          <div style={{width:70}}>
            <label style={labelSt}>Notti</label>
            <div style={{...inputSt,textAlign:"center",fontFamily:fontD,fontSize:20,fontWeight:700,color:T.accent,padding:"10px 4px",background:"rgba(0,0,0,.02)",cursor:"default"}}>{bookForm.days}</div>
          </div>
        </div>

        {/* Mezza giornata — solo se NON stagionale */}
        {est.halfDay?.enabled&&!bookForm.isConv&&bookForm.sub!=="stagionale"&&<div>
          <label style={labelSt}>Tipo giornata</label>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setBookForm(p=>({...p,isHalfDay:false}))} style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:font,fontSize:13,fontWeight:600,border:!bookForm.isHalfDay?`2px solid ${T.accent}`:`1.5px solid ${T.border}`,background:!bookForm.isHalfDay?"rgba(226,97,59,.06)":T.white,color:T.dark}}>☀️ Giornata intera</button>
            <button onClick={()=>setBookForm(p=>({...p,isHalfDay:true}))} style={{flex:1,padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:font,fontSize:13,fontWeight:600,border:bookForm.isHalfDay?`2px solid ${T.accent}`:`1.5px solid ${T.border}`,background:bookForm.isHalfDay?"rgba(226,97,59,.06)":T.white,color:T.dark}}>
              🕐 Mezza giornata<span style={{display:"block",fontSize:10,fontWeight:400,color:T.darkSoft}}>dalle {est.halfDay.startTime} · €{est.halfDay[modal.cell.type]??"-"}/gg</span>
            </button>
          </div>
        </div>}

        {/* Extra dotazioni */}
        {!bookForm.isConv&&<div style={{background:"rgba(0,0,0,.02)",borderRadius:12,padding:"12px 14px",border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <label style={{...labelSt,marginBottom:0}}>🛏️ Dotazioni aggiuntive</label>
            {bookForm.sub==="stagionale"&&<span style={{fontSize:10,color:T.gold,fontWeight:600}}>prezzi per giorno</span>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[
              {key:"lettino",icon:"🛏️",lbl:"Lettino",price:est.pricing.sunbed||10},
              {key:"sdraio",icon:"🪑",lbl:"Sdraio",price:est.pricing.sdraio||6},
              {key:"sedia_regista",icon:"🎬",lbl:"Sedia Regista",price:est.pricing.sedia_regista||5}
            ].map(({key,icon,lbl,price})=>{
              const qty=(bookForm.extras||{})[key]||0;
              return(<div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <span style={{fontSize:15,marginRight:6}}>{icon}</span>
                  <span style={{fontSize:13,color:T.dark,fontWeight:500}}>{lbl}</span>
                  <span style={{fontSize:10,color:T.darkSoft,marginLeft:6}}>€{price}/gg</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button onClick={()=>setBookForm(p=>({...p,extras:{...p.extras,[key]:Math.max(0,(p.extras?.[key]||0)-1)}}))} style={{width:28,height:28,borderRadius:8,border:`1px solid ${T.border}`,background:T.white,cursor:"pointer",fontSize:16,fontWeight:700,color:T.darkSoft,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <span style={{width:22,textAlign:"center",fontWeight:700,fontSize:14,color:T.dark}}>{qty}</span>
                  <button onClick={()=>setBookForm(p=>({...p,extras:{...p.extras,[key]:(p.extras?.[key]||0)+1}}))} style={{width:28,height:28,borderRadius:8,border:"none",background:T.sea,cursor:"pointer",fontSize:16,fontWeight:700,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  {qty>0&&<span style={{fontSize:11,color:T.accent,fontWeight:600,minWidth:56,textAlign:"right"}}>€{price*qty}/gg</span>}
                </div>
              </div>);
            })}
          </div>
        </div>}

        {/* Strutture convenzionate */}
        {bookForm.showCalc&&<CalcModal onClose={()=>setBookForm(p=>({...p,showCalc:false}))} onInsert={v=>setBookForm(p=>({...p,stagPrezzo:v,convPrice:v,showCalc:false}))}/>}
        <div style={{borderRadius:12,border:`1.5px solid ${bookForm.isConv?T.gold:T.border}`,overflow:"hidden"}}>
          <div onClick={()=>setBookForm(p=>({...p,isConv:!p.isConv,isHalfDay:false}))} style={{padding:"10px 14px",background:bookForm.isConv?T.goldSoft:"rgba(0,0,0,.02)",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${bookForm.isConv?T.gold:T.darkSoft}`,background:bookForm.isConv?T.gold:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12}}>{bookForm.isConv?"✓":""}</div>
            <span style={{fontSize:13,fontWeight:600,color:bookForm.isConv?T.gold:T.dark}}>🤝 Struttura Convenzionata</span>
            <span style={{fontSize:11,color:T.darkSoft,marginLeft:4}}>prezzo manuale</span>
          </div>
          {bookForm.isConv&&<div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
            <div><label style={labelSt}>Nome struttura</label><input value={bookForm.convName||""} onChange={e=>setBookForm(p=>({...p,convName:e.target.value}))} placeholder="Es. Hotel Sole..." style={inputSt}/></div>
            <div><label style={labelSt}>Prezzo totale accordato €</label>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18,fontWeight:700,color:T.darkSoft}}>€</span>
                <input type="number" min="0" step="1" value={bookForm.convPrice||""} onChange={e=>setBookForm(p=>({...p,convPrice:+e.target.value||0}))} placeholder="0" style={{...inputSt,fontSize:22,fontFamily:fontD,fontWeight:700,textAlign:"center",flex:1}}/>
                <button onClick={()=>setBookForm(p=>({...p,showCalc:true}))} style={{...btnS(T.gold),padding:"10px 14px",fontSize:18,flexShrink:0}}>🧮</button>
              </div>
            </div>
          </div>}
        </div>

        {/* Totale */}
        <div style={{background:T.goldSoft,borderRadius:12,padding:"14px 16px",border:`1px solid rgba(201,150,58,.25)`}}>
          {(()=>{
            const extras=bookForm.extras||{};
            const extrasPerDay=(extras.lettino||0)*(est.pricing.sunbed||10)+(extras.sdraio||0)*(est.pricing.sdraio||6)+(extras.sedia_regista||0)*(est.pricing.sedia_regista||5);
            const extrasTot=extrasPerDay*bookForm.days;
            if(bookForm.sub==="stagionale"){
              const stagBase=bookForm.stagPrezzo||0;
              const grandTotal=stagBase+extrasTot;
              return(<div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:T.gold,fontWeight:600}}>⭐ Ombrellone stagionale ({bookForm.days} notti)</span>
                  <span style={{fontFamily:fontD,fontSize:18,color:T.gold}}>€{stagBase}</span>
                </div>
                {extrasPerDay>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:T.darkSoft}}>Extra dotazioni (€{extrasPerDay}/gg × {bookForm.days}gg)</span>
                  <span style={{fontFamily:fontD,fontSize:18,color:T.accent}}>€{extrasTot}</span>
                </div>}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid rgba(201,150,58,.25)`,paddingTop:8,marginTop:2}}>
                  <span style={{fontSize:13,fontWeight:700,color:T.dark}}>Totale stagione</span>
                  <span style={{fontFamily:fontD,fontSize:30,color:T.dark,fontWeight:700}}>€{grandTotal}</span>
                </div>
              </div>);
            }
            if(bookForm.isConv){
              return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:T.gold,fontWeight:600}}>🤝 {bookForm.convName||"Convenzionata"}</span>
                <span style={{fontFamily:fontD,fontSize:30,color:T.dark}}>€{bookForm.convPrice||0}</span>
              </div>);
            }
            const sp=est.seasonPricing?.find(s=>bookForm.from>=s.from&&bookForm.from<=s.to);
            const base=sp&&sp[modal.cell.type]!=null?sp[modal.cell.type]:(est.pricing[modal.cell.type]||0);
            const mainP=bookForm.isHalfDay&&est.halfDay?.enabled?(est.halfDay[modal.cell.type]??Math.round(base*.6)):base;
            const mainTot=mainP*bookForm.days;
            return(<div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:T.darkSoft}}>€{mainP}/gg × {bookForm.days} notti{sp?` · ${sp.name}`:""}</span>
                <span style={{fontFamily:fontD,fontSize:18,color:T.dark}}>€{mainTot}</span>
              </div>
              {extrasPerDay>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:T.darkSoft}}>Extra €{extrasPerDay}/gg × {bookForm.days}</span>
                <span style={{fontFamily:fontD,fontSize:18,color:T.accent}}>€{extrasTot}</span>
              </div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid rgba(201,150,58,.2)`,paddingTop:6,marginTop:2}}>
                <span style={{fontSize:12,fontWeight:600,color:T.dark}}>Totale</span>
                <span style={{fontFamily:fontD,fontSize:30,color:T.dark}}>€{mainTot+extrasTot}</span>
              </div>
            </div>);
          })()}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setModal(null)} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Annulla</button>
          <button onClick={confirmBooking} style={{flex:1,...btnS(T.accent),justifyContent:"center",padding:"12px",opacity:bookForm.clientName.trim()?1:.5}}>Conferma</button>
        </div>
      </div>
    </Modal>}

    {modal?.type==="details"&&<Modal onClose={()=>setModal(null)}>
      <h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:4}}>{modal.cell.type==="cabana"?`🏠 C${modal.cell.num}`:`🏖️ Omb. ${modal.cell.num}`} — Prenotato</h3>
      <div style={{background:"rgba(0,0,0,.03)",borderRadius:14,padding:16,display:"flex",flexDirection:"column",gap:6,margin:"12px 0 14px"}}>
        {[["Cliente",modal.bk.clientName],["Dal",fmtDate(modal.bk.from)],["Al",fmtDate(modal.bk.to)],["Giorni",modal.bk.days],
          ["Tipo",modal.bk.isConv?`🤝 Convenzionata${modal.bk.convName?" — "+modal.bk.convName:""}`:modal.bk.isHalfDay?`🕐 Mezza giornata (dalle ${est.halfDay?.startTime||"13:00"})`:"☀️ Giornata intera"]
        ].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:T.darkSoft}}>{l}</span><span style={{fontSize:14,fontWeight:600,color:T.dark}}>{v}</span></div>)}
        {modal.bk.extras&&(modal.bk.extras.lettino>0||modal.bk.extras.sdraio>0||modal.bk.extras.sedia_regista>0)&&
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:T.darkSoft}}>Extra</span>
            <span style={{fontSize:13,fontWeight:600,color:T.dark}}>
              {[["🛏️ Lettino",modal.bk.extras.lettino],["🪑 Sdraio",modal.bk.extras.sdraio],["🎬 S.Regista",modal.bk.extras.sedia_regista]].filter(([,n])=>n>0).map(([l,n])=>`${n}× ${l}`).join("  ")}
            </span>
          </div>}
        <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${T.border}`,paddingTop:6}}><span style={{fontSize:13,color:T.darkSoft}}>Totale</span><span style={{fontFamily:fontD,fontSize:22,color:T.accent}}>€{modal.bk.total}</span></div>
      </div>
      <div style={{display:"flex",gap:10}}><button onClick={()=>setModal(null)} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Chiudi</button><button onClick={freeBk} style={{flex:1,...btnS(T.warn),justifyContent:"center",padding:"12px"}}>🗑️ Rimuovi</button></div>
    </Modal>}

    {/* ══ OCCUPANCY DETAIL MODAL ══ */}
    {occModal&&<Modal onClose={()=>setOccModal(null)} wide>
      {(()=>{
        const isUmb=occModal.type==="umbrella";
        const occ=getOccupied(occModal.type,selectedDate);
        const totalItems=isUmb?(()=>{let t=0;est.grid.forEach(r=>r.forEach(c=>{if(c.type==="umbrella")t++;}));return t;})():(()=>{let t=0;est.cabins.forEach(r=>r.forEach(()=>t++));return t;})();
        const totalRev=occ.reduce((s,o)=>s+o.total,0);
        return(<>
          <h3 style={{fontFamily:fontD,fontSize:22,color:T.dark,marginBottom:2}}>{isUmb?"🏖️ Ombrelloni Occupati":"🏠 Cabine Occupate"}</h3>
          <p style={{color:T.darkSoft,fontSize:12,marginBottom:14}}>Data: <strong>{fmtDate(selectedDate)}</strong> — {occ.length} occupat{isUmb?"i":"e"} su {totalItems} · Incasso giornata: <strong style={{color:T.accent}}>€{totalRev}</strong></p>
          {occ.length===0?<div style={{textAlign:"center",padding:"32px 0",color:T.darkSoft}}>
            <div style={{fontSize:36,marginBottom:8}}>{isUmb?"🏖️":"🏠"}</div>
            <div style={{fontSize:14}}>Nessun{isUmb?"o ombrellone":"a cabina"} occupat{isUmb?"o":"a"} in questa data.</div>
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:400,overflowY:"auto"}}>
            {occ.map((o,i)=>(<div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:i%2===0?"rgba(0,0,0,.02)":"transparent",borderRadius:10,gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
                <div style={{width:36,height:36,borderRadius:8,background:T.warnSoft,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:700,color:T.warn}}>{isUmb?o.num:`C${o.num}`}</span>
                </div>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:T.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.client}</div>
                  <div style={{fontSize:10,color:T.darkSoft}}>{fmtDate(o.from)} → {fmtDate(o.to)}{o.isConv?` · 🤝 ${o.convName||"Conv."}`:""}{o.isHalfDay?" · 🕐 Mezza gg":""}</div>
                  {o.extras&&(o.extras.lettino>0||o.extras.sdraio>0||o.extras.sedia_regista>0)&&<div style={{fontSize:9,color:T.darkSoft}}>
                    {[["🛏️",o.extras.lettino],["🪑",o.extras.sdraio],["🎬",o.extras.sedia_regista]].filter(([,n])=>n>0).map(([ic,n])=>`${n}×${ic}`).join("  ")}
                  </div>}
                </div>
              </div>
              {isUmb&&o.fila&&<span style={{fontSize:9,color:T.darkSoft,padding:"2px 6px",background:"rgba(0,0,0,.04)",borderRadius:5,flexShrink:0}}>F{o.fila}</span>}
              <span style={{fontFamily:fontD,fontSize:16,color:T.accent,fontWeight:700,flexShrink:0}}>€{o.total}</span>
            </div>))}
          </div>}
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={()=>setOccModal(null)} style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${T.darkSoft}`,background:"transparent",color:T.darkSoft,cursor:"pointer",fontSize:14,fontFamily:font}}>Chiudi</button>
          </div>
        </>);
      })()}
    </Modal>}

    <footer style={{textAlign:"center",padding:"16px",fontSize:10,color:"rgba(110,80,64,.2)",fontStyle:"italic"}}>🌊 Bagno Capri · www.bagnocapri.com — {(()=>{let u=0,c=0;est.grid.forEach(r=>r.forEach(cl=>{if(cl.type==="umbrella")u++;}));est.cabins.forEach(r=>r.forEach(()=>c++));return`${u} ombrelloni · ${c} cabine`;})()}  · v3.3</footer>
    <AIAssistant est={est} clients={clients} currentUser={currentUser}/>
  </div>);
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
